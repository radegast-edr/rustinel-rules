title: Microsoft Defender Tampering via Registry
id: b2c3d4e5-8f90-4123-8b4c-5d6e7f801a11
status: experimental
description: >
  Detects registry modifications that disable core Microsoft Defender
  protections such as anti-spyware, real-time monitoring and behavior
  monitoring. Commonly used to blind endpoint defenses prior to payload
  execution.
  Note: Rustinel's registry telemetry exposes the key path in TargetObject and
  the value name in Details, so this rule matches the Defender value names in
  either field to remain robust across event shapes.
references:
  - https://attack.mitre.org/techniques/T1562/001/
author: rustinel-rules
date: 2026-06-04
tags:
  - attack.defense-evasion
  - attack.t1562.001
logsource:
  category: registry_event
  product: windows
detection:
  selection_path:
    TargetObject|contains: '\Windows Defender'
  value_in_keyname:
    TargetObject|contains:
      - 'DisableAntiSpyware'
      - 'DisableRealtimeMonitoring'
      - 'DisableBehaviorMonitoring'
      - 'DisableScanOnRealtimeEnable'
      - 'DisableOnAccessProtection'
      - 'DisableIOAVProtection'
  value_in_details:
    Details|contains:
      - 'DisableAntiSpyware'
      - 'DisableRealtimeMonitoring'
      - 'DisableBehaviorMonitoring'
      - 'DisableScanOnRealtimeEnable'
      - 'DisableOnAccessProtection'
      - 'DisableIOAVProtection'
  condition: selection_path and (value_in_keyname or value_in_details)
falsepositives:
  - Authorized AV migration or managed GPO changes.
level: high
rustinel:
  telemetry:
    - registry_event
  expected_false_positive_level: low
  test_status: none
