title: Registry Hive Dump via reg.exe save
id: e7a1b9c2-4d6f-4a83-b2e5-1c0d9f3a4b20
status: experimental
description: >
  Detects reg.exe being used to export the SAM, SYSTEM or SECURITY hives, which
  together allow offline extraction of local account password hashes and
  secrets. A high-confidence credential-access technique with no common
  legitimate use.
references:
  - https://attack.mitre.org/techniques/T1003/002/
  - https://lolbas-project.github.io/lolbas/Binaries/Reg/
author: rustinel-rules
date: 2026-06-04
tags:
  - attack.credential-access
  - attack.t1003.002
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    Image|endswith: '\reg.exe'
  selection_save:
    CommandLine|contains: 'save'
  selection_hive:
    CommandLine|contains:
      - 'hklm\sam'
      - 'hklm\system'
      - 'hklm\security'
  condition: selection_img and selection_save and selection_hive
falsepositives:
  - Rare administrative or backup workflows that export registry hives.
level: high
rustinel:
  telemetry:
    - process_creation
  expected_false_positive_level: low
  test_status: none
