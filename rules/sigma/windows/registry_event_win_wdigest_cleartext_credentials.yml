title: WDigest Cleartext Credential Caching Enabled
id: b4d8f0c5-3a92-4e67-9d1b-7c3e2f5a0d23
status: experimental
description: >
  Detects modification of the WDigest UseLogonCredential value, which when
  enabled forces LSASS to cache plaintext credentials in memory for later
  harvesting. A common credential-access preparation step.
  Note: Rustinel exposes the registry key path in TargetObject and the value
  name in Details; this rule matches the value name in either field.
references:
  - https://attack.mitre.org/techniques/T1003/001/
author: rustinel-rules
date: 2026-06-04
tags:
  - attack.credential-access
  - attack.t1003.001
logsource:
  category: registry_event
  product: windows
detection:
  selection_path:
    TargetObject|contains: '\Control\SecurityProviders\WDigest'
  value_in_keyname:
    TargetObject|contains: 'UseLogonCredential'
  value_in_details:
    Details|contains: 'UseLogonCredential'
  condition: selection_path and (value_in_keyname or value_in_details)
falsepositives:
  - Rare legacy applications that require WDigest; investigate any occurrence.
level: high
rustinel:
  telemetry:
    - registry_event
  expected_false_positive_level: low
  test_status: atomic
