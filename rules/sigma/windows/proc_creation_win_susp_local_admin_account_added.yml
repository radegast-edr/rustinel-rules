title: Local Account Created or Added to Administrators
id: 6f0d2a91-3b7c-4e58-9a16-8c4e1d7b2a09
status: experimental
description: >
  Detects creation of a local account or addition of an account to a privileged
  local group via net.exe / net1.exe. Used by adversaries to establish
  persistence and escalate access.
references:
  - https://attack.mitre.org/techniques/T1136/001/
  - https://attack.mitre.org/techniques/T1098/
author: rustinel-rules
date: 2026-06-04
tags:
  - attack.persistence
  - attack.t1136.001
  - attack.t1098
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
  selection_useradd:
    CommandLine|contains|all:
      - 'user'
      - '/add'
  selection_groupadd:
    CommandLine|contains|all:
      - 'localgroup'
      - '/add'
    CommandLine|contains:
      - 'administrators'
      - 'administrateurs'
  condition: selection_img and (selection_useradd or selection_groupadd)
falsepositives:
  - Legitimate provisioning, onboarding and IT administration scripts.
level: medium
rustinel:
  telemetry:
    - process_creation
  expected_false_positive_level: medium
  test_status: none
