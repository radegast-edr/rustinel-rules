title: Office Application Spawning a Command Shell
id: c4a7f2e9-5d3b-4810-a6c1-9e0f3b7d2a03
status: experimental
description: >
  Detects a Microsoft Office application spawning a command interpreter or
  scripting host. This parent/child relationship is a hallmark of malicious
  macro and phishing execution chains.
references:
  - https://attack.mitre.org/techniques/T1566/001/
  - https://attack.mitre.org/techniques/T1059/
author: rustinel-rules
date: 2026-06-04
tags:
  - attack.initial-access
  - attack.t1566.001
  - attack.execution
  - attack.t1059
logsource:
  category: process_creation
  product: windows
detection:
  selection_parent:
    ParentImage|endswith:
      - '\winword.exe'
      - '\excel.exe'
      - '\powerpnt.exe'
      - '\outlook.exe'
      - '\mspub.exe'
  selection_child:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
  condition: selection_parent and selection_child
falsepositives:
  - Rare legitimate add-ins or templates that shell out to scripts.
level: high
rustinel:
  telemetry:
    - process_creation
  expected_false_positive_level: low
  test_status: atomic
