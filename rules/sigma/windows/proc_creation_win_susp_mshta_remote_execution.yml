title: Mshta Remote or Inline Script Execution
id: 3c6f9b22-7e1a-4d85-9c0b-2a8d4e6f1b07
status: experimental
description: >
  Detects mshta.exe executing remote HTA content or inline script protocols
  (javascript:/vbscript:), a living-off-the-land proxy-execution technique.
references:
  - https://attack.mitre.org/techniques/T1218/005/
  - https://lolbas-project.github.io/lolbas/Binaries/Mshta/
author: rustinel-rules
date: 2026-06-04
tags:
  - attack.defense-evasion
  - attack.t1218.005
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    Image|endswith: '\mshta.exe'
  selection_payload:
    CommandLine|contains:
      - 'http://'
      - 'https://'
      - 'javascript:'
      - 'vbscript:'
  condition: selection_img and selection_payload
falsepositives:
  - Legacy intranet line-of-business HTA applications.
level: medium
rustinel:
  telemetry:
    - process_creation
  expected_false_positive_level: medium
  test_status: none
