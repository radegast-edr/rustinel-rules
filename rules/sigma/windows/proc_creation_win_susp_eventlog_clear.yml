title: Windows Event Log Cleared via Command Line
id: 5e8b1d44-9c2a-4f67-8d03-7b1a6e3c9d08
status: experimental
description: >
  Detects clearing of Windows event logs through wevtutil or PowerShell cmdlets.
  Adversaries clear logs to destroy evidence and hinder incident response.
references:
  - https://attack.mitre.org/techniques/T1070/001/
author: rustinel-rules
date: 2026-06-04
tags:
  - attack.defense-evasion
  - attack.t1070.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_wevtutil:
    Image|endswith: '\wevtutil.exe'
    CommandLine|contains:
      - ' cl '
      - ' clear-log'
  selection_ps:
    CommandLine|contains:
      - 'Clear-EventLog'
      - '.ClearEventLog('
  condition: selection_wevtutil or selection_ps
falsepositives:
  - Authorized log rotation or maintenance tooling.
level: high
rustinel:
  telemetry:
    - process_creation
  expected_false_positive_level: low
  test_status: none
