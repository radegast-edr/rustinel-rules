title: Active Directory Database (NTDS.dit) Extraction
id: a3c7e9b4-2f81-4d56-8c0a-6b2d1f4e9c22
status: experimental
description: >
  Detects extraction of the Active Directory database via ntdsutil IFM media
  creation or direct references to ntds.dit. On a domain controller this yields
  every domain credential and is a critical credential-access technique.
references:
  - https://attack.mitre.org/techniques/T1003/003/
  - https://lolbas-project.github.io/lolbas/Binaries/Ntdsutil/
author: rustinel-rules
date: 2026-06-04
tags:
  - attack.credential-access
  - attack.t1003.003
logsource:
  category: process_creation
  product: windows
detection:
  selection_ntdsutil:
    Image|endswith: '\ntdsutil.exe'
    CommandLine|contains:
      - 'create full'
      - 'create rodc'
      - 'ifm'
      - 'ac i ntds'
  selection_ntdsfile:
    CommandLine|contains: 'ntds.dit'
  condition: selection_ntdsutil or selection_ntdsfile
falsepositives:
  - Legitimate domain controller backup or migration performed by administrators.
level: high
rustinel:
  telemetry:
    - process_creation
  expected_false_positive_level: low
  test_status: manual
  test_reason: Requires a domain controller or AD database fixture, which hosted GitHub runners do not provide.
