title: Execution from World-Writable / Temporary Directory
id: 60718293-a4b5-46c7-8fd8-5b6c7d8e9fa6
status: experimental
description: >
  Detects a process executing from a world-writable or temporary location
  (/tmp, /var/tmp, /dev/shm). Common for dropped payloads and in-memory staging,
  though build tooling and some installers also run from these paths, so intended
  for the Advanced tier.
references:
  - https://attack.mitre.org/techniques/T1059/004/
  - https://attack.mitre.org/techniques/T1036/
author: rustinel-rules
date: 2026-06-04
tags:
  - attack.execution
  - attack.defense-evasion
  - attack.t1059.004
  - attack.t1036
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    Image|startswith:
      - '/tmp/'
      - '/var/tmp/'
      - '/dev/shm/'
  condition: selection
falsepositives:
  - Build systems, package managers and installers that execute helper binaries from temp paths.
  - Container entrypoints and CI jobs that intentionally stage executables in temporary directories.
level: medium
rustinel:
  telemetry:
    - process_creation
  expected_false_positive_level: medium
  test_status: atomic
