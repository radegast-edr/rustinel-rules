# EICAR anti-malware test file indicators.
#
# EICAR is a standardized, harmless test file that every scanner is expected to
# flag. It is used here as a *safe, reproducible* way to confirm the IOC pipeline
# is wired end to end: build a pack, point Rustinel's [ioc] config at it, drop an
# EICAR file on disk, and you should see a hash match. Replace/extend with real
# curated indicators over time.
id: ioc-eicar-test
description: >
  EICAR anti-malware test file hashes. Safe, standardized artifact used to verify
  that file-scanning / IOC detection is correctly wired end to end.
os:
  - common
severity: low
references:
  - https://www.eicar.org/download-anti-malware-testfile/
indicators:
  hashes:
    - value: 44d88612fea8a8f36de82e1278abb02f
      comment: EICAR test file (MD5)
    - value: 3395856ce81f2b7382dee72602f798b642f14140
      comment: EICAR test file (SHA1)
    - value: 275a021bbfb6489e54d471899f7db9d1663fc695ec2fe2a2c4538aabf651fd0f
      comment: EICAR test file (SHA256)
