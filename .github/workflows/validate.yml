name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Detection as Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync tooling (uv)
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check tools

      - name: Format check (ruff)
        run: uv run ruff format --check tools

      - name: Type check (ty)
        run: uv run ty check

      - name: Validate rules and pack manifests
        working-directory: tools
        run: uv run python validate.py

  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync tooling (uv)
        run: uv sync --frozen

      - name: Build packs (zips + index.json)
        working-directory: tools
        run: uv run python build_packs.py

      - name: Build website catalog (catalog.json)
        working-directory: tools
        run: uv run python build_catalog.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rustinel-rules-dist
          path: dist/
          if-no-files-found: error
