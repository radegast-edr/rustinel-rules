name: atomic

# Firing tests: install the rustinel engine on real Windows + Linux runners,
# perform an atomic action for each rule, and check the rule produced an alert.
# Installs published engine releases (>= v1.1.0) via the official install scripts.
on:
  workflow_dispatch:
    inputs:
      filter:
        description: "Only run tests whose name/id contains this substring"
        required: false
        default: ""
      pack:
        description: "Pack id to load (or 'auto')"
        required: false
        default: "auto"
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  atomic:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build rules pack
        run: |
          uv sync --frozen
          uv run python tools/validate.py
          uv run python tools/build_packs.py
        shell: bash

      - name: Check atomic coverage metadata
        run: python tests/atomic/run_atomics.py --check-coverage --strict-essential
        shell: bash

      # Resolve "latest" ourselves with an authenticated API call (GITHUB_TOKEN,
      # ~1000 req/h/repo) instead of letting the install script make an
      # unauthenticated one (60 req/h shared across all runner IPs -> 403).
      # Passing --version then makes the install script skip the API call entirely.
      - name: Resolve latest rustinel version
        id: engine
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$(gh release view --repo Karib0u/rustinel --json tagName --jq '.tagName')"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "Resolved rustinel engine version: ${tag#v}"
        shell: bash

      - name: Install rustinel engine (Linux)
        if: matrix.platform == 'linux'
        run: |
          for attempt in 1 2 3; do
            if curl -fsSL https://raw.githubusercontent.com/Karib0u/rustinel/main/scripts/install/install.sh \
                | sh -s -- --dir "$GITHUB_WORKSPACE/tests/atomic/.engine" --version "${{ steps.engine.outputs.version }}" --force; then
              exit 0
            fi
            echo "engine install attempt $attempt failed; retrying in $((attempt * 10))s" >&2
            sleep "$((attempt * 10))"
          done
          echo "engine install failed after 3 attempts" >&2
          exit 1
        shell: bash

      - name: Install rustinel engine (Windows)
        if: matrix.platform == 'windows'
        run: |
          Invoke-WebRequest https://raw.githubusercontent.com/Karib0u/rustinel/main/scripts/install/install.ps1 -OutFile install.ps1
          $ok = $false
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            try {
              powershell -ExecutionPolicy Bypass -File .\install.ps1 -InstallDir "$env:GITHUB_WORKSPACE\tests\atomic\.engine" -Version "${{ steps.engine.outputs.version }}" -Force
              if ($LASTEXITCODE -eq 0) { $ok = $true; break }
            } catch {
              Write-Host "attempt $attempt threw: $_"
            }
            Write-Host "engine install attempt $attempt failed; retrying in $($attempt * 10)s"
            Start-Sleep -Seconds ($attempt * 10)
          }
          if (-not $ok) { exit 1 }
        shell: pwsh

      - name: Exclude workspace from Defender (Windows, for EICAR)
        if: matrix.platform == 'windows'
        run: Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE" -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Run atomic tests (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo -E python3 tests/atomic/run_atomics.py \
            --platform linux \
            --engine-dir "$GITHUB_WORKSPACE/tests/atomic/.engine" \
            --pack "${{ github.event.inputs.pack || 'auto' }}" \
            --filter "${{ github.event.inputs.filter }}"
        shell: bash

      - name: Run atomic tests (Windows)
        if: matrix.platform == 'windows'
        run: |
          python tests\atomic\run_atomics.py `
            --platform windows `
            --engine-dir "$env:GITHUB_WORKSPACE\tests\atomic\.engine" `
            --pack "${{ github.event.inputs.pack || 'auto' }}" `
            --filter "${{ github.event.inputs.filter }}"
        shell: pwsh

      - name: Upload report + engine logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: atomic-report-${{ matrix.platform }}
          path: |
            tests/atomic/report-*.json
            tests/atomic/.engine/logs/
          include-hidden-files: true   # .engine/ is a dotdir, skipped otherwise
          if-no-files-found: warn
