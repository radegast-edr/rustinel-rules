name: Windows Hunting
id: windows-hunting
description: >
    Windows Advanced plus broad, noisier hunting content intended for analyst-driven
    investigation. Not enabled by default and not suitable as a standing alert source
    without tuning.
os: windows
level: hunting
pack_schema_version: 1
requires_rustinel: ">=1.0.2"
default: false
expected_false_positive_level: high
status: experimental
license: DRL-1.1
extends:
  - windows-advanced
attack_coverage:
  - T1105
telemetry_requirements:
  - process_creation
test_status: none
sources:
    manual:
      - https://attack.mitre.org/
      - https://lolbas-project.github.io/
rules:
    has:
        sigma:
          - 3e2d1c0b-5a4f-4938-8271-6a5b4c3d2e10   # Certutil Used to Download Remote Content (Hunting)
